<body>
    <div class="content">
        <header>
            <h2>共通テストプログラミングトレーニング</h2>
        </header>

        <main>
            <section class="practice">
                <div class="practice-top">
                    <h3>練習問題集</h3>
                    <p class="practice-lead">
                        典型問題を「基礎 → 応用」の順に練習できます。各問題は、ヒントを見ながら段階的に解ける構成を想定しています。
                    </p>
                    <div class="practice-actions">
                        <a class="link-button" href="./index.html"><i class="fa-solid fa-arrow-left"></i> トップへ</a>
                        <a class="link-button" href="./editor.html"><i class="fa-solid fa-pen-to-square"></i> エディターへ</a>
                    </div>
                </div>

                <div class="practice-controls">
                    <input type="text" id="practice-search" placeholder="問題名・内容で検索">
                    <div class="practice-filter-buttons" id="practice-difficulty-buttons">
                        <button type="button" class="practice-filter-button active" data-difficulty="">すべて</button>
                        <button type="button" class="practice-filter-button" data-difficulty="1">★1</button>
                        <button type="button" class="practice-filter-button" data-difficulty="2">★2</button>
                        <button type="button" class="practice-filter-button" data-difficulty="3">★3</button>
                        <button type="button" class="practice-filter-button" data-difficulty="4">★4</button>
                        <button type="button" class="practice-filter-button" data-difficulty="5">★5</button>
                    </div>
                    <div class="practice-filter-buttons" id="practice-sort-buttons">
                        <button type="button" class="practice-filter-button active" data-sort="newest">新しい順</button>
                        <button type="button" class="practice-filter-button" data-sort="id">問題番号順</button>
                    </div>
                </div>
                <div class="practice-table-wrap">
                    <table class="practice-table" aria-label="練習問題一覧">
                        <thead>
                            <tr>
                                <th scope="col">難易度</th>
                                <th scope="col">タイトル</th>
                                <th scope="col">内容</th>
                                <th scope="col">追加日</th>
                            </tr>
                        </thead>
                        <tbody id="practice-tbody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
</body>
