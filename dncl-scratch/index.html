<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>DNCL Scratch</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>

<body>
    <h2>DNCL Scratch</h2>

    <div id="palette">
        <button onclick="addBlock('assign')">代入</button>
        <button onclick="addBlock('print')">表示</button>
        <button onclick="addBlock('if')">もし</button>
        <button onclick="addBlock('ifelse')">もし＋そうでなければ</button>
        <button onclick="addBlock('for')">for</button>
    </div>

    <!-- ★ここが追加 -->
    <div id="main">

        <!-- 左：ブロック -->
        <div id="left">
            <h3>プログラム</h3>
            <div id="workspace"></div>
        </div>

        <!-- 右：コード＆出力 -->
        <div id="right">
            <h3>コード</h3>
            <pre id="code"></pre>

            <button onclick="run()">▶ 実行</button>

            <h3>出力</h3>
            <pre id="output"></pre>
        </div>

    </div>

    <script src="blocks.js"></script>
    <script src="executor.js"></script>
    <script src="main.js"></script>
</body>

</html>
