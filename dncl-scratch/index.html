<body>
    <div class="content">
        <header>
            <h2>DNCLビジュアルエディタ</h2>
        </header>

        <main>

            <div class="palette">
                <button onclick="addBlock('assign')">代入</button>
                <button onclick="addBlock('print')">表示</button>
                <button onclick="addBlock('if')">もし</button>
                <button onclick="addBlock('ifelse')">もし＋そうでなければ</button>
                <button onclick="addBlock('for')">繰り返し</button>
                <button onclick="addBlock('array')">配列</button>
                <button onclick="addBlock('expr')">計算</button>
                <button onclick="loadDebugSample()">デバッグ用サンプル</button>
            </div>

            <div class="dncl-main">

                <div class="dncl-left">
                    <h4>プログラム</h4>
                    <div id="workspace"></div>
                </div>

                <div class="dncl-right">

                    <h4>コード</h4>
                    <pre id="code"></pre>

                    <button onclick="run()">▶ 実行</button>
                    <button onclick="stepStart()">⏭ ステップ開始</button>
                    <button onclick="stepNext()">▶ 次へ</button>

                    <h4>出力</h4>
                    <pre id="output"></pre>

                    <h4>変数</h4>
                    <div id="vars" class="vars-panel"></div>

                </div>
            </div>

        </main>
    </div>

    <script src="./blocks.js"></script>
    <script src="./executor.js"></script>
    <script src="./main.js"></script>
    <script src="./tests.js"></script>
