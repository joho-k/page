            <h1>第14問 平均点で合格クラス判定</h1>
            <p>4人のテストの合計点は240点です。平均点を求め、平均が60点以上のときだけ「合格クラス」と表示されるようにしよう（2か所の穴をうめよう）</p>
            <p>難易度：★★★☆☆（3／標準）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>goukei = 240
ninzu = 4
heikin = goukei ［A］ ninzu
もし heikin ［B］ 60 ならば:
  表示する(&quot;合格クラス&quot;)</code></pre>
            <p>空欄 ［A］・［B］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>*</code></li>
                <li><code>/</code></li>
                <li><code>&gt;</code></li>
                <li><code>&gt;=</code></li>
                <li><code>&lt;</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>まず合計を人数で割って平均を出し、その平均が60以上かどうかを判定しよう</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>/</code></li>
            <li>空欄 ［B］ … <code>&gt;=</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>*</code>　［B］<code>&gt;=</code> … 掛け算では平均になりません。合計を人数で割りましょう</li>
            <li>［A］<code>/</code>　［B］<code>&gt;</code> … 60点ちょうどのときも合格クラスにしたいです</li>
            <li>［A］<code>/</code>　［B］<code>&lt;</code> … 60点以上のときに合格クラスにしたいので、小さいときではありません</li>
            <li>［A］<code>*</code>　［B］<code>&gt;</code> … 平均は合計÷人数で求めます。また60点ちょうども合格にしたいです</li>
            </ul>
