            <h1>第25問 ナベアツ算</h1>
            <p>1から40までの整数について、「3の倍数」または「3のつく数」のときに「🤪」、それ以外は「🤨」を表示するプログラムです。3の倍数かどうか、3が数字についているかどうかの式を、それぞれ選択肢から選んで空欄に入れよう（3か所の穴をうめよう）</p>
            <p>難易度：★★★★★（5／難しい）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>表示する(&quot;3の倍数と3のつくときにアホ(🤪)になります&quot;)
i を 1 から 40 まで 1 ずつ増やしながら繰り返す:
  kao = &quot;🤨&quot;
  amari = ［A］
  もし amari == 0 ならば:
    kao = &quot;🤪&quot;
  そうでなければ:
    juu_no_kurai = ［B］
    ichi_no_kurai = ［C］
    もし juu_no_kurai == 3 ならば:
      kao = &quot;🤪&quot;
    そうでなければ:
      もし ichi_no_kurai == 3 ならば:
        kao = &quot;🤪&quot;
  表示する(kao + &quot;&lt; &quot; + i)</code></pre>
            <p>空欄 ［A］・［B］・［C］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>i % 3</code></li>
                <li><code>i % 10</code></li>
                <li><code>i / 3</code></li>
                <li><code>i / 10</code></li>
                <li><code>切り捨て(i / 3)</code></li>
                <li><code>切り捨て(i / 10)</code></li>
                <li><code>i % 5</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>3の倍数は「3で割ったあまり」が0かどうかで判定します。十の位は切り捨て(i / 10)、一の位は i % 10 で取り出せます。</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>i % 3</code></li>
            <li>空欄 ［B］ … <code>切り捨て(i / 10)</code></li>
            <li>空欄 ［C］ … <code>i % 10</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>i / 3</code>　［B］<code>切り捨て(i / 10)</code>　［C］<code>i % 10</code> … 3の倍数かどうかは、3で割った「あまり」が0かどうかで判定します。3で割った商では判定できません。</li>
            <li>［A］<code>i % 3</code>　［B］<code>i / 10</code>　［C］<code>i % 10</code> … 十の位を取り出すには、小数部分を切り捨てる必要があります。切り捨て(i / 10) を使いましょう。</li>
            <li>［A］<code>i % 3</code>　［B］<code>切り捨て(i / 3)</code>　［C］<code>i % 10</code> … 十の位を取り出すには10で割ります。3で割ると十の位は取り出せません。</li>
            <li>［A］<code>i % 3</code>　［B］<code>切り捨て(i / 10)</code>　［C］<code>i / 10</code> … 一の位は10で割った「あまり」です。i % 10 を使いましょう。</li>
            <li>［A］<code>i % 5</code>　［B］<code>切り捨て(i / 10)</code>　［C］<code>i % 10</code> … 3の倍数かどうかを調べるので、3で割ったあまり（i % 3）を使います。</li>
            </ul>
