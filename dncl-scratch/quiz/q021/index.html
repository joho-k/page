    <noscript>
        <article>
            <h1>第21問 毎日2倍に増える菌</h1>
            <p>1日目に1個だった菌が、毎日2倍に増えます。何日目に何個になるかを表示しながら、菌の数が100個をこえるのは何日目かを求めよう。菌の増やし方と、日数の数え方の2か所の穴をうめよう</p>
            <p>難易度：★★☆☆☆（2／やさしい）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>kin = 1
nissu = 1
表示する(nissu + &quot;日目は&quot; + kin + &quot;個&quot;)
kin &lt; 100 の間繰り返す:
  kin = kin ［A］ 2
  nissu = nissu ［B］ 1
  表示する(nissu + &quot;日目は&quot; + kin + &quot;個&quot;)
表示する(&quot;100個をこえるのは&quot; + nissu + &quot;日目&quot;)</code></pre>
            <p>空欄 ［A］・［B］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>+</code></li>
                <li><code>-</code></li>
                <li><code>*</code></li>
                <li><code>/</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>1日目がすでに1個なので、2倍にするたびに日数も1ずつ進むよ。「2倍」は2をかけること</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>*</code></li>
            <li>空欄 ［B］ … <code>+</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>+</code>　［B］<code>+</code> … 「2倍になる」は2を足すのではなく、2をかけます。足し算だと 1, 3, 5 …と2ずつしか増えません</li>
            <li>［A］<code>*</code>　［B］<code>-</code> … 日数は1日ずつ進むので、nissu は1ずつ増やします。引き算だと日数がマイナスになってしまいます</li>
            <li>［A］<code>/</code>　［B］<code>+</code> … わり算だと菌が減っていき、100個をこえないので繰り返しが終わりません</li>
            <li>［A］<code>-</code>　［B］<code>+</code> … 引き算だと菌が増えません。「2倍に増える」を表す計算を選ぼう</li>
            </ul>
