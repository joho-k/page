    <noscript>
        <article>
            <h1>第12問 配ったおかしの数（二重ループ）</h1>
            <p>お菓子の個数が15個あります。3人の友だちに、おかしを1人あたり同じ数ずつ配れるように、空欄を埋めよう。</p>
            <p>難易度：★★★★☆（4／やや難しい）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>kosu = 15
hito を 1 から 3 まで 1 ずつ増やしながら繰り返す:
  表示する(hito + &quot;人目にお菓子を配ります。&quot;)
  okashi を 1 から ［A］ まで 1 ずつ増やしながら繰り返す:
    kosu = kosu - 1
    表示する(&quot;  &quot; + okashi + &quot;個目のお菓子を渡しました。残りは&quot; + kosu + &quot;個です。&quot;)</code></pre>
            <p>空欄 ［A］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>3</code></li>
                <li><code>5</code></li>
                <li><code>7</code></li>
                <li><code>15</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>15個のお菓子を平等に渡すためには、1人に何個のお菓子を渡せばいいでしょうか？</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>5</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>3</code> … 1人に3個渡していることになります。15個のお菓子を平等に渡すためには、1人に何個のお菓子を渡せばいいでしょうか？</li>
            <li>［A］<code>7</code> … 1人に7個渡していることになります。15個のお菓子を平等に渡すためには、1人に何個のお菓子を渡せばいいでしょうか？</li>
            <li>［A］<code>15</code> … 1人に15個渡していることになります。15個のお菓子を平等に渡すためには、1人に何個のお菓子を渡せばいいでしょうか？</li>
            </ul>
