            <h1>第26問 秒を分と秒に直す</h1>
            <p>500秒は何分何秒でしょうか。1分は60秒です。分の数と、残りの秒数をそれぞれ計算して「8分20秒」のように表示するようにしよう（2か所の穴をうめよう）</p>
            <p>難易度：★★★☆☆（3／標準）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>byou = 500
fun = ［A］
nokori = ［B］
表示する(byou + &quot;秒は&quot; + fun + &quot;分&quot; + nokori + &quot;秒です&quot;)</code></pre>
            <p>空欄 ［A］・［B］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>切り捨て(byou / 60)</code></li>
                <li><code>byou % 60</code></li>
                <li><code>byou / 60</code></li>
                <li><code>byou * 60</code></li>
                <li><code>byou - 60</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>1分＝60秒なので、60でわった「商」が分、「あまり」が残りの秒数です。商は小数が出ないように 切り捨て(...) を、あまりは % を使いましょう</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>切り捨て(byou / 60)</code></li>
            <li>空欄 ［B］ … <code>byou % 60</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>byou / 60</code>　［B］<code>byou % 60</code> … 500 / 60 は 8.333… になり、「8.333…分」と表示されてしまいます。小数部分を落として8分にするには 切り捨て(byou / 60) を使いましょう</li>
            <li>［A］<code>byou % 60</code>　［B］<code>切り捨て(byou / 60)</code> … 2つが逆です。60でわった「商」が分の数、60でわった「あまり」が残りの秒数になります</li>
            <li>［A］<code>切り捨て(byou / 60)</code>　［B］<code>byou - 60</code> … byou - 60 は 500 - 60 で440です。60秒を1回ぶんしか取り除けていません。何回ぶん取り除いても残るのが「あまり」なので byou % 60 を使いましょう</li>
            <li>［A］<code>byou * 60</code>　［B］<code>byou % 60</code> … 秒を分に直すときは60でかけるのではなく、60でわります。500 * 60 では逆に大きくなってしまいます</li>
            <li>［A］<code>切り捨て(byou / 60)</code>　［B］<code>byou / 60</code> … 残りの秒数がほしいので、わり算の「あまり」を使います。byou % 60 なら 500 を 60 でわったあまりの20が出ます</li>
            </ul>
