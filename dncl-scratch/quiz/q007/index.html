        <article>
            <h1>第7問 合計金額の計算</h1>
            <p>1個120円のりんごを3個買ったときの合計金額が表示されるようにしよう</p>
            <p>難易度：★☆☆☆☆（1／入門）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>price = 120
kosu = 3
goukei = price ［A］ kosu
表示する(&quot;合計金額は&quot; + goukei + &quot;円&quot;)</code></pre>
            <p>空欄 ［A］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>+</code></li>
                <li><code>-</code></li>
                <li><code>*</code></li>
                <li><code>/</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>単価×個数で合計金額を求めよう</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>*</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>+</code> … 足し算では「120個ぶんの代金」になりません</li>
            <li>［A］<code>-</code> … 引き算では合計金額になりません</li>
            <li>［A］<code>/</code> … 割り算では合計金額になりません</li>
            </ul>
