        <article>
            <h1>第3問 2の倍数判定</h1>
            <p>2の倍数のときだけ「2の倍数です」と表示されるようにしよう</p>
            <p>難易度：★★☆☆☆（2／やさしい）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>i を 1 から 10 まで 1 ずつ増やしながら繰り返す:
  amari = i ［A］ 2
  もし amari == 0 ならば:
    表示する(i + &quot;は2の倍数です&quot;)
  そうでなければ:
    表示する(i + &quot;は2の倍数でない&quot;)</code></pre>
            <p>空欄 ［A］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>+</code></li>
                <li><code>-</code></li>
                <li><code>*</code></li>
                <li><code>/</code></li>
                <li><code>%</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>2で割った「あまり」を求める演算子を考えよう</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>%</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>/</code> … 割り算ではなく「あまり」を求めます</li>
            <li>［A］<code>+</code> … 足し算では2の倍数か判定できません</li>
            <li>［A］<code>-</code> … 引き算では2の倍数か判定できません</li>
            <li>［A］<code>*</code> … 掛け算では「あまり」は求められません</li>
            </ul>
