            <h1>第24問 コラッツ予想（角谷の問題）</h1>
            <p>「偶数なら2でわる、奇数なら3倍して1をたす」を繰り返すと、どんな数でもいつかは1になる、というのがコラッツ予想（角谷の問題）です。n=6 が何回で1になるかを数えて表示しよう。まず n を2でわったあまりで偶数か奇数かを調べ、偶数なら半分に、奇数なら3n+1にします（3か所の穴をうめよう）</p>
            <p>難易度：★★★★★（5／難しい）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>n = 6
kaisu = 0
n &gt; 1 の間繰り返す:
  amari = ［A］
  もし amari == 0 ならば:
    n = ［B］
  そうでなければ:
    n = ［C］
  kaisu = kaisu + 1
表示する(&quot;回数は&quot; + kaisu)</code></pre>
            <p>空欄 ［A］・［B］・［C］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>n % 2</code></li>
                <li><code>n / 2</code></li>
                <li><code>n * 3 + 1</code></li>
                <li><code>n * 2</code></li>
                <li><code>n - 2</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>偶数・奇数は n % 2 で判定します。偶数なら n / 2、奇数なら n * 3 + 1 にして繰り返します</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>n % 2</code></li>
            <li>空欄 ［B］ … <code>n / 2</code></li>
            <li>空欄 ［C］ … <code>n * 3 + 1</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>n / 2</code>　［B］<code>n / 2</code>　［C］<code>n * 3 + 1</code> … 偶数か奇数かは2でわった「あまり」で調べます。n / 2 では商になってしまうので、n % 2 を使いましょう</li>
            <li>［A］<code>n % 2</code>　［B］<code>n * 2</code>　［C］<code>n * 3 + 1</code> … 偶数のときは半分にします。2倍ではなく n / 2 を使います</li>
            <li>［A］<code>n % 2</code>　［B］<code>n - 2</code>　［C］<code>n * 3 + 1</code> … 偶数のときは2を引くのではなく、2で割って半分にします</li>
            <li>［A］<code>n % 2</code>　［B］<code>n / 2</code>　［C］<code>n * 2</code> … 奇数のときは「3倍して1をたす」ので、n * 3 + 1 を使いましょう</li>
            </ul>
