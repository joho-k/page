    <noscript>
        <article>
            <h1>第6問 HPが0になるまで</h1>
            <p>hp が0より大きい間、繰り返されるようにしよう</p>
            <p>難易度：★★★☆☆（3／標準）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>hp = 5
hp ［A］ 0 の間繰り返す:
  表示する(&quot;ダメージ！&quot;)
  hp = hp - 1</code></pre>
            <p>空欄 ［A］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>&gt;</code></li>
                <li><code>&lt;</code></li>
                <li><code>==</code></li>
                <li><code>!=</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>hpが残っている間、繰り返したい</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>&gt;</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>&lt;</code> … hpは減っていきます</li>
            <li>［A］<code>==</code> … 最初は5なので条件を満たしません</li>
            <li>［A］<code>!=</code> … 負の値になっても止まらない可能性があります</li>
            </ul>
