    <noscript>
        <article>
            <h1>第20問 残りのページ数</h1>
            <p>全部で120ページの本を、45ページまで読みました。残りが何ページあるかを表示するようにしよう</p>
            <p>難易度：★☆☆☆☆（1／入門）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>zentai = 120
yonda = 45
nokori = zentai ［A］ yonda
表示する(&quot;残りは&quot; + nokori + &quot;ページ&quot;)</code></pre>
            <p>空欄 ［A］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>+</code></li>
                <li><code>-</code></li>
                <li><code>*</code></li>
                <li><code>/</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>全体のページ数から、すでに読んだページ数を取り除くと残りが求まるよ</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>-</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>+</code> … 足し算だと 120 + 45 で 165 ページになり、本のページ数より多くなってしまいます</li>
            <li>［A］<code>*</code> … 掛け算だと 120 × 45 になってしまいます。残りは「全体から読んだぶんを取り除いた数」です</li>
            <li>［A］<code>/</code> … 割り算では残りのページ数になりません。何ページ減ったかを考えよう</li>
            </ul>
