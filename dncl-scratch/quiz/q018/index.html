            <h1>第18問 素数判定（約数の個数）</h1>
            <p>素数とは「1とその数自身でしか割り切れない数」で、これは「約数がちょうど2個ある数」と言いかえられます。1からnまで順に割ってみて約数の個数を数え、n=13が素数かどうかを表示しよう（3か所の穴をうめよう）</p>
            <p>難易度：★★★★★（5／難しい）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>n = 13
yakusu = 0
i を 1 から n まで 1 ずつ増やしながら繰り返す:
  amari = n ［A］ i
  もし amari == 0 ならば:
    yakusu = yakusu ［B］ 1
もし yakusu ［C］ 2 ならば:
  表示する(&quot;素数です&quot;)
そうでなければ:
  表示する(&quot;素数ではありません&quot;)</code></pre>
            <p>空欄 ［A］・［B］・［C］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>%</code></li>
                <li><code>/</code></li>
                <li><code>+</code></li>
                <li><code>*</code></li>
                <li><code>==</code></li>
                <li><code>&gt;</code></li>
                <li><code>&gt;=</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>n を i でわったあまりが0なら、i は n の約数です。約数の個数を数え、それがちょうど2個(1と自分自身のみ)なら素数、と考えよう</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>%</code></li>
            <li>空欄 ［B］ … <code>+</code></li>
            <li>空欄 ［C］ … <code>==</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>/</code>　［B］<code>+</code>　［C］<code>==</code> … 割り算の答えでは「割り切れるかどうか」は分かりません。わったあまりが0かを見たいので % を使います</li>
            <li>［A］<code>%</code>　［B］<code>*</code>　［C］<code>==</code> … yakusu は0から始まるので掛け算では0のまま増えません。約数を1個ずつ + で数えます</li>
            <li>［A］<code>%</code>　［B］<code>+</code>　［C］<code>&gt;</code> … 「約数が2個より多い」だと、約数がたくさんある数まで素数と判定してしまいます。ちょうど2個(==)が素数の条件です</li>
            <li>［A］<code>%</code>　［B］<code>+</code>　［C］<code>&gt;=</code> … 「約数が2個以上」だと、約数を多く持つ合成数もすべて素数になってしまいます。ちょうど2個だけを == で判定します</li>
            </ul>
