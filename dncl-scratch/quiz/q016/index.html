    <noscript>
        <article>
            <h1>第16問 3の倍数を数える</h1>
            <p>1から20までの整数のうち、3の倍数が何個あるかを数えて表示するようにしよう（2か所の穴をうめよう）</p>
            <p>難易度：★★★☆☆（3／標準）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>count = 0
i を 1 から 20 まで 1 ずつ増やしながら繰り返す:
  amari = i % 3
  もし amari == 0 ならば:
    count = count ［A］ ［B］
表示する(&quot;3の倍数は&quot; + count + &quot;個&quot;)</code></pre>
            <p>空欄 ［A］・［B］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>+</code></li>
                <li><code>-</code></li>
                <li><code>*</code></li>
                <li><code>1</code></li>
                <li><code>2</code></li>
                <li><code>i</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>3の倍数を1個見つけるたびに、count を1ずつ増やそう（count = count + 1）</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>+</code></li>
            <li>空欄 ［B］ … <code>1</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>+</code>　［B］<code>i</code> … count + i だと個数ではなく3の倍数の合計になってしまいます。数えるときは毎回1ずつ増やします</li>
            <li>［A］<code>-</code>　［B］<code>1</code> … 引き算では count が減っていきます。見つけた数を数えるには足していきます</li>
            <li>［A］<code>*</code>　［B］<code>2</code> … 掛け算では正しく数えられません。1個見つけるたびに1を足しましょう</li>
            <li>［A］<code>+</code>　［B］<code>2</code> … 1個見つけるたびに2ずつ増えてしまい、個数が2倍になります。足すのは1です</li>
            </ul>
