    <noscript>
        <article>
            <h1>第15問 一の位を取り出す</h1>
            <p>整数 num（＝47）の一の位（いちのくらい）の数字だけを取り出して表示するようにしよう</p>
            <p>難易度：★★★☆☆（3／標準）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>num = 47
ichi = num ［A］ 10
表示する(&quot;一の位は&quot; + ichi)</code></pre>
            <p>空欄 ［A］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>+</code></li>
                <li><code>-</code></li>
                <li><code>*</code></li>
                <li><code>/</code></li>
                <li><code>%</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>それぞれの演算子で num を計算するとどうなるか考えてみよう。10で割った「あまり」が一の位になるよ</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>%</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>/</code> … num / 10 を計算するとどうなる？ 47 / 10 は商の4になります。一の位を取り出すには「あまり」がほしいですね</li>
            <li>［A］<code>+</code> … num + 10 を計算するとどうなる？ 47 + 10 は 57 です。一の位の7を取り出せているでしょうか？</li>
            <li>［A］<code>-</code> … num - 10 を計算するとどうなる？ 47 - 10 は 37 です。一の位の7を取り出せているでしょうか？</li>
            <li>［A］<code>*</code> … num * 10 を計算するとどうなる？ 47 * 10 は 470 です。一の位の7を取り出せているでしょうか？</li>
            </ul>
