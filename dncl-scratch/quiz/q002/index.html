    <noscript>
        <article>
            <h1>第2問 繰り返し回数</h1>
            <p>「これを3回表示してください」を3回表示するようにしよう</p>
            <p>難易度：★☆☆☆☆（1／入門）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>i を 0 から ［A］ まで 1 ずつ増やしながら繰り返す:
  表示する(&quot;これを3回表示してください&quot;)</code></pre>
            <p>空欄 ［A］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>1</code></li>
                <li><code>2</code></li>
                <li><code>3</code></li>
                <li><code>4</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>0,1,2 の3回になるように考えよう</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>2</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>3</code> … 0から始まることに注意しよう</li>
            <li>［A］<code>1</code> … 2回しか繰り返されません</li>
            <li>［A］<code>4</code> … 5回繰り返されてしまいます</li>
            </ul>
