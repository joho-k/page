            <h1>第17問 フィボナッチ数列</h1>
            <p>フィボナッチ数列は、直前の2つの数をたして次の数を作る数列です（1, 1, 2, 3, 5, 8, …）。tsugi に次の数を計算したあと、zen（ひとつ前）と ima（今の数）を正しく更新して、この数列を8個表示できるようにしよう（2か所の穴をうめよう）</p>
            <p>難易度：★★★★☆（4／やや難しい）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>zen = 0
ima = 1
i を 1 から 8 まで 1 ずつ増やしながら繰り返す:
  表示する(ima)
  tsugi = zen + ima
  zen = ［A］
  ima = ［B］</code></pre>
            <p>空欄 ［A］・［B］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>zen</code></li>
                <li><code>ima</code></li>
                <li><code>tsugi</code></li>
                <li><code>i</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>次の数を作ったら、今の数 ima を zen へ移し、新しい tsugi を ima にします（zen ← ima、ima ← tsugi）</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>ima</code></li>
            <li>空欄 ［B］ … <code>tsugi</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>tsugi</code>　［B］<code>ima</code> … 組み合わせが逆です。zen には「ひとつ前」だった ima を、ima には新しい tsugi を入れます</li>
            <li>［A］<code>ima</code>　［B］<code>ima</code> … ima に ima を入れても値は変わりません。新しい数 tsugi を入れましょう</li>
            <li>［A］<code>zen</code>　［B］<code>tsugi</code> … zen に zen を入れても更新されません。zen には今の数 ima を移します</li>
            <li>［A］<code>tsugi</code>　［B］<code>tsugi</code> … 両方に tsugi を入れると zen と ima が同じ値になり、数列が正しく進みません</li>
            </ul>
