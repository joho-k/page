        <article>
            <h1>第8問 偶数の合計（1〜10）</h1>
            <p>1から10までの整数のうち、偶数だけを合計して表示するようにしよう（3か所の穴をうめよう）</p>
            <p>難易度：★★★☆☆（3／標準）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>goukei = 0
i を 1 から 10 まで 1 ずつ増やしながら繰り返す:
  amari = i % 2
  もし amari == 0 ならば:
    goukei = ［A］ ［B］ ［C］
表示する(&quot;偶数の合計は&quot; + goukei)</code></pre>
            <p>空欄 ［A］・［B］・［C］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>goukei</code></li>
                <li><code>i</code></li>
                <li><code>amari</code></li>
                <li><code>+</code></li>
                <li><code>-</code></li>
                <li><code>*</code></li>
                <li><code>/</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>これまでの合計 goukei に i を足して、新しい goukei にしよう</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>goukei</code></li>
            <li>空欄 ［B］ … <code>+</code></li>
            <li>空欄 ［C］ … <code>i</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>goukei</code>　［B］<code>*</code>　［C］<code>i</code> … 合計は今までの値に i を足していきます。掛け算ではありません</li>
            <li>［A］<code>goukei</code>　［B］<code>-</code>　［C］<code>i</code> … 引き算では合計になりません。足し算で積み上げます</li>
            <li>［A］<code>amari</code>　［B］<code>+</code>　［C］<code>i</code> … 足し込む先は合計を入れている goukei です。amari ではありません</li>
            </ul>
