        <article>
            <h1>第1問 合計（穴埋め）</h1>
            <p>sumに、xとyを合計した値を代入するプログラムを作成せよ</p>
            <p>難易度：★☆☆☆☆（1／入門）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>x = 25
y = 30
sum = ［A］ + ［B］
表示する(&quot;xとyの合計は&quot; + sum)</code></pre>
            <p>空欄 ［A］・［B］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>x</code></li>
                <li><code>y</code></li>
                <li><code>25</code></li>
                <li><code>30</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>xとyを合計する式を考えよう</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>x</code></li>
            <li>空欄 ［B］ … <code>y</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>25</code>　［B］<code>30</code> … 変数xとyを使おう</li>
            <li>［A］<code>30</code>　［B］<code>25</code> … 数値ではなく変数を使おう</li>
            </ul>
