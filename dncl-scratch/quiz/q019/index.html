    <noscript>
        <article>
            <h1>第19問 買い物のおつり</h1>
            <p>300円と450円の品物を買い、1000円札を出しました。2つの品物の合計金額を求めてから、おつりがいくらになるかを表示しよう（2か所の穴をうめよう）</p>
            <p>難易度：★★☆☆☆（2／やさしい）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>nedan1 = 300
nedan2 = 450
goukei = nedan1 ［A］ nedan2
harau = 1000
otsuri = harau ［B］ goukei
表示する(&quot;おつりは&quot; + otsuri + &quot;円&quot;)</code></pre>
            <p>空欄 ［A］・［B］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>+</code></li>
                <li><code>-</code></li>
                <li><code>*</code></li>
                <li><code>/</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>まず2つの品物の値段を足して合計を出し、次に払ったお金(1000円)からその合計を引くとおつりが求まるよ</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>+</code></li>
            <li>空欄 ［B］ … <code>-</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>-</code>　［B］<code>-</code> … 2つの品物の合計金額は「足し算」で求めます。引き算だと 300 - 450 になってしまい、合計になりません</li>
            <li>［A］<code>+</code>　［B］<code>+</code> … おつりは「払ったお金 - 代金」で求めます。足し算だと払ったお金と代金がさらに増えてしまいます</li>
            <li>［A］<code>*</code>　［B］<code>-</code> … 合計金額は 300 と 450 を足すだけです。掛け算だと 300 × 450 になってしまいます</li>
            <li>［A］<code>+</code>　［B］<code>*</code> … おつりは払ったお金から代金を引きます。掛け算では 1000 × 750 になってしまい、おつりになりません</li>
            </ul>
