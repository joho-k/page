    <noscript>
        <article>
            <h1>第5問 テスト合格判定</h1>
            <p>score が80以上のときだけ「合格」と表示されるようにしよう</p>
            <p>難易度：★★★☆☆（3／標準）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>score = 85
もし score ［A］ 80 ならば:
  表示する(&quot;合格&quot;)</code></pre>
            <p>空欄 ［A］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>&gt;</code></li>
                <li><code>&lt;</code></li>
                <li><code>&gt;=</code></li>
                <li><code>&lt;=</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>80以上になる条件を考えよう</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>&gt;=</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>&gt;</code> … 80ちょうどのときも合格にしたい</li>
            <li>［A］<code>&lt;</code> … 小さい場合ではありません</li>
            <li>［A］<code>&lt;=</code> … 80以下になってしまいます</li>
            </ul>
