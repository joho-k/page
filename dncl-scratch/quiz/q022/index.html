        <article>
            <h1>第22問 1000円以上で割引</h1>
            <p>買い物の合計金額が1000円以上のときだけ200円引きになるようにしよう。合計はちょうど1000円です。1000円のときも割引されるように、条件と計算の2か所の穴をうめよう</p>
            <p>難易度：★★★☆☆（3／標準）。共通テスト「情報I」で使われるDNCL（共通テスト用プログラム表記）の穴埋め問題です。JavaScriptを有効にすると、このページでプログラムを組み立てて実行しながら解けます。</p>

            <h2>プログラム</h2>
            <pre><code>goukei = 1000
もし goukei ［A］ 1000 ならば:
  goukei = goukei ［B］ 200
表示する(&quot;支払いは&quot; + goukei + &quot;円&quot;)</code></pre>
            <p>空欄 ［A］・［B］ に当てはまるものを、次の選択肢から選びます。</p>

            <h2>選択肢</h2>
            <ul>
                <li><code>&gt;</code></li>
                <li><code>&gt;=</code></li>
                <li><code>+</code></li>
                <li><code>-</code></li>
            </ul>

            <h2>ヒント</h2>
            <p>「1000円以上」はちょうど1000円もふくむので &gt;=。割引は金額を引くので - を使うよ</p>

            <h2>解答</h2>
            <ul>
            <li>空欄 ［A］ … <code>&gt;=</code></li>
            <li>空欄 ［B］ … <code>-</code></li>
            </ul>
            <h2>よくある間違い</h2>
            <ul>
            <li>［A］<code>&gt;</code>　［B］<code>-</code> … 合計はちょうど1000円です。&gt; だと1000円のときに割引されません。「1000円以上」はイコールをふくむ &gt;= を使います</li>
            <li>［A］<code>&gt;=</code>　［B］<code>+</code> … 割引は金額を「引く」ことなので - を使います。+ だと逆に200円高くなってしまいます</li>
            <li>［A］<code>&gt;</code>　［B］<code>+</code> … 「以上」は &gt;=、「割引（引く）」は - です。2か所ともまちがえています</li>
            </ul>
