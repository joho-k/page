<script>
    // 単語のリストをデータとして管理
    const wordListData = [
        {
            title: "情報とメディア",
            items: [
                { title: "情報とは", link: "information" },
                { title: "情報の特性", link: "info-properties" },
                { title: "情報源", link: "info-sources" },
                { title: "情報の検証", link: "info-verification" },

            ]
        },
        {
            title: "情報社会の法とセキュリティ",
            items: [
                { title: "個人情報", link: "personal-information" },
                { title: "産業財産権", link: "intellectual-property" },
                { title: "著作権", link: "copyright" },
                { title: "情報セキュリティ", link: "info-security" },
            ]
        },
        {
            title: "情報のデジタル表現",
            items: [
                { title: "デジタル情報と進数表現", link: "digital-and-binary" },
                { title: "データの大きさを表す単位", link: "data-size-units" },
                { title: "文字のデジタル表現", link: "text-binaly" },
                { title: "音のデジタル表現", link: "audio-digital" },
                { title: "画像のデジタル表現", link: "image-digital" },
                { title: "色のデジタル表現", link: "color-digital" },
                { title: "動画のデジタル表現", link: "video-digital" },
                { title: "データの圧縮", link: "data-compression" },
                { title: "情報デザイン", link: "info-design" },
            ]
        },
        {
            title: "コンピュータの仕組み",
            items: [
                { title: "コンピュータの構成", link: null },
                { title: "浮動小数点数", link: null }
            ]
        },
        {
            title: "アルゴリズム",
            items: [
                { title: "二分探索", link: "algorithm-binary-search" },
            ]
        },
        {
            title: "プログラミング",
            items: [
                { title: "変数と代入", link: null },
                { title: "条件分岐", link: null },
                { title: "繰り返し", link: null },
                { title: "配列", link: null },
                { title: "関数", link: null }
            ]
        },
        {
            title: "モデル化とシミュレーション",
            items: [
                { title: "モデル化", link: null },
                { title: "シミュレーション", link: null }
            ]
        },
        {
            title: "情報通信ネットワーク",
            items: [
                { title: "コンピュータネットワーク", link: null },
                { title: "通信プロトコル", link: null },
                { title: "パケット通信", link: null },
                { title: "通信の信頼性(パリティビット)", link: null },
                { title: "IPアドレス", link: null },
                { title: "ドメイン", link: null },
                { title: "WWW", link: null },
                { title: "URL", link: null }
            ]
        },
        {
            title: "情報の暗号化",
            items: [
                { title: "暗号化とは", link: "encryption" },
                { title: "共通鍵暗号方式", link: "common-key" },
                { title: "公開鍵暗号方式", link: "public-key" }
            ]
        }
    ];

    // 単語リストをHTMLに描画する関数
    function renderWordList() {
        const wordListContainer = document.getElementById('word-list');

        wordListData.forEach(category => {
            // カテゴリのヘッダー作成
            const categoryList = document.createElement('div');
            categoryList.className = "item"

            const categoryTitle = document.createElement('h4');
            categoryTitle.textContent = category.title;
            categoryList.appendChild(categoryTitle)

            // サブアイテムリスト作成
            if (category.items.length > 0) {
                const itemList = document.createElement('ul');
                itemList.className = 'item-list';

                category.items.forEach(item => {
                    const listItem = document.createElement('li');

                    // リンクがある場合はaタグを作成、ない場合はテキストとComming Soonを表示
                    if (item.link) {
                        const link = document.createElement('a');
                        link.href = `word/${item.link}/index.html`;
                        link.textContent = item.title;
                        listItem.className += "list-word"
                        listItem.appendChild(link);
                    } else {
                        const text = document.createTextNode(item.title + ' ');
                        listItem.appendChild(text);
                        listItem.className += "coming-soon";

                        const comingSoon = document.createElement('span');
                        comingSoon.className = 'coming-soon';
                        comingSoon.textContent = 'Coming Soon';
                        listItem.appendChild(comingSoon);
                    }

                    itemList.appendChild(listItem);
                });

                categoryList.appendChild(itemList);
            }

            wordListContainer.appendChild(categoryList);
        });
    }

    // ページ読み込み完了時にリストを描画
    document.addEventListener('DOMContentLoaded', renderWordList);
</script>
